<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="scene">

    <div class="card-container" id="cardContainer">

      <div class="wallet">
        <div class="wallet-back"></div>

        <div class="card" id="card">
          <div class="card-inner" id="cardInner">
            <div class="card-face card-front">
              <div class="freeze-overlay" id="freezeOverlay"></div>
            </div>
            <div class="card-face card-back">
              <div class="card-details-overlay"></div>
              <div class="card-detail top-left">
                <span class="label">Kortinnehavare</span>
                <span class="value">Högnelid, Jonathan</span>
              </div>
              <div class="card-details-bottom">
                <div class="card-detail">
                  <span class="label">Kortnummer</span>
                  <span class="value card-number" id="cardNumber">•••• •••• •••• ••••</span>
                </div>
                <div class="card-detail">
                  <span class="label">EXP</span>
                  <span class="value">10/29</span>
                </div>
                <div class="card-detail">
                  <span class="label">CVC</span>
                  <span class="value">565</span>
                </div>
                <div class="card-detail">
                  <span class="label">PIN</span>
                  <span class="value pin-value" id="pinValue">••••</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="wallet-hint" id="hint">
          <span class="hint-text">Click to see card details</span>
          <div class="card-number-row">
            <img src="assets/dots.svg" alt="" class="dots" />
            <span class="last-four">4202</span>
          </div>
        </div>

        <div class="wallet-front-wrap">
          <img src="assets/walletfront.svg" alt="" />
        </div>
        <div class="stitching-wrap">
          <img src="assets/stitching.svg" alt="" />
        </div>
      </div>

      <div class="panel" id="panel">
        <div class="panel-inner">
          <div class="toggle-row">
            <span class="toggle-label">Freeze card</span>
            <button class="toggle" id="toggleFreeze" role="switch" aria-checked="false">
              <span class="toggle-thumb"></span>
            </button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Show PIN</span>
            <button class="toggle" id="togglePin" role="switch" aria-checked="false">
              <span class="toggle-thumb"></span>
            </button>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Show card details</span>
            <button class="toggle" id="toggleDetails" role="switch" aria-checked="false">
              <span class="toggle-thumb"></span>
            </button>
          </div>
        </div>
      </div>

      <div class="btn-wrap">
        <button id="btn">
          <span class="btn-label">Show details</span>
          <i data-lucide="x" class="btn-icon"></i>
        </button>
      </div>

    </div>

  </div>
  <script src="main.js"></script>
</body>
</html>
