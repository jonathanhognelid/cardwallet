<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="scene">

    <div class="card-container" id="cardContainer">

      <div class="wallet">
        <div class="wallet-back"></div>

        <div class="card" id="card">
          <div class="card-tilt" id="cardTilt">
            <div class="card-inner" id="cardInner">

              <!-- Front face -->
              <div class="card-face card-front"></div>

              <!-- Back face -->
              <div class="card-face card-back">
                <div class="card-back-tint"></div>
                <div class="freeze-tint"></div>
                <div class="card-stripe"></div>
                <div class="card-back-details">
                  <div class="card-back-name-number">
                    <span class="card-back-label">APPLESEED JOHN</span>
                    <span class="card-back-number" id="cardNumber">0000 0000 0000 0000</span>
                  </div>
                  <div class="card-back-addinfo">
                    <div class="card-back-exp">
                      <span class="card-back-label">EXP</span>
                      <span class="card-back-mono">10/29</span>
                    </div>
                    <div class="card-back-cvc">
                      <span class="card-back-label">CVC</span>
                      <span class="card-back-mono cvc-value" id="cvcValue">000</span>
                    </div>
                  </div>
                </div>
                <div class="freeze-blur-layer"></div>
                <img src="assets/freeze-blur.png" alt="" class="freeze-blur-img patch-edge" />
                <img src="assets/freeze-blur.png" alt="" class="freeze-blur-img patch-mid" />

                <div class="copy-btn-wrap">
                  <div class="copy-tooltip" id="copyTooltip">Copy card number</div>
                  <button class="copy-btn" id="copyBtn" aria-label="Copy card number">
                    <i data-lucide="copy" class="copy-icon-default"></i>
                    <i data-lucide="circle-check" class="copy-icon-success"></i>
                  </button>
                </div>

                <div class="card-inner-shadow"></div>
              </div>

            </div>
          </div>
        </div>

        <div class="wallet-front-wrap">
          <img src="assets/walletfront.svg" alt="" />
        </div>
        <div class="stitching-wrap">
          <img src="assets/stitching.svg" alt="" />
        </div>
      </div>

      <!-- Panel -->
      <div class="panel" id="panel">
        <div class="toggle-row" id="rowCvc">
          <span class="toggle-label">Show CVC</span>
          <button class="toggle" id="toggleCvc" role="switch" aria-checked="false">
            <span class="toggle-thumb"></span>
          </button>
        </div>
        <div class="toggle-row" id="rowNumber">
          <span class="toggle-label">Show card number</span>
          <button class="toggle" id="toggleNumber" role="switch" aria-checked="false">
            <span class="toggle-thumb"></span>
          </button>
        </div>
        <div class="toggle-row">
          <span class="toggle-label">Freeze card</span>
          <button class="toggle" id="toggleFreeze" role="switch" aria-checked="false">
            <span class="toggle-thumb"></span>
          </button>
        </div>
      </div>

      <!-- Button -->
      <div class="btn-wrap">
        <button id="btn">
          <i data-lucide="eye" class="btn-icon-eye"></i>
          <i data-lucide="eye-off" class="btn-icon-eye-off"></i>
        </button>
      </div>

    </div>

  </div>
  <script src="main.js"></script>
</body>
</html>
